<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Ledger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="brand">Ledger <span class="tag">MARKETPLACE</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="bids.html">Bids</a></li>
      <li><a href="contracts.html">Contracts</a></li>
    </ul>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="card auth-card">
    <h2>Welcome back</h2>
    <p class="muted mt-8" style="margin-bottom:20px">Log in with the email you registered with.</p>

    <form id="login-form" data-role="Freelancer">
      <div class="badge-role">
        <button type="button" class="role-btn active" data-role="Freelancer">I'm a Freelancer</button>
        <button type="button" class="role-btn" data-role="Client">I'm a Client</button>
      </div>
      <div class="field">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-16">Log In</button>
    </form>

    <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
